
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{display:flex;height:680px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary);font-size:13px}
.sidebar{width:200px;flex-shrink:0;border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;background:var(--color-background-secondary)}
.sidebar-logo{padding:18px 16px 14px;border-bottom:0.5px solid var(--color-border-tertiary)}
.logo-text{font-size:15px;font-weight:500;letter-spacing:0.5px;color:var(--color-text-primary)}
.logo-sub{font-size:10px;color:var(--color-text-tertiary);margin-top:2px}
.compose-btn{margin:12px 12px 0;padding:8px 12px;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);font-size:12px;cursor:pointer;text-align:center}
.compose-btn:hover{opacity:0.85}
.nav-section{padding:12px 0 0}
.nav-label{font-size:10px;color:var(--color-text-tertiary);padding:0 16px 6px;letter-spacing:0.5px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;color:var(--color-text-secondary);font-size:12px;border-left:2px solid transparent;transition:all 0.1s}
.nav-item:hover{background:var(--color-background-primary);color:var(--color-text-primary)}
.nav-item.active{background:var(--color-background-primary);color:var(--color-text-primary);border-left-color:var(--color-text-primary);border-radius:0}
.nav-icon{width:14px;height:14px;opacity:0.6;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--color-text-primary);color:var(--color-background-primary);font-size:10px;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center}
.char-section{margin-top:auto;border-top:0.5px solid var(--color-border-tertiary);padding:12px}
.char-label{font-size:10px;color:var(--color-text-tertiary);margin-bottom:8px}
.char-item{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer}
.char-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.char-dot.online{background:#4caf50}
.char-dot.offline{background:var(--color-border-secondary)}
.char-name{font-size:11px;color:var(--color-text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px;flex-shrink:0}
.toolbar-title{font-size:14px;font-weight:500;color:var(--color-text-primary);flex:1}
.search-box{padding:5px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;width:160px;background:var(--color-background-secondary);color:var(--color-text-primary)}
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.mail-list{flex:1}
.mail-row{display:flex;align-items:stretch;padding:0;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer;transition:background 0.1s}
.mail-row:hover{background:var(--color-background-secondary)}
.mail-row.selected{background:var(--color-background-info)}
.mail-row.unread .mail-sender{font-weight:500;color:var(--color-text-primary)}
.unread-dot{width:3px;background:var(--color-text-primary);flex-shrink:0;align-self:stretch}
.mail-row:not(.unread) .unread-dot{background:transparent}
.mail-inner{display:flex;flex-direction:column;padding:10px 14px;flex:1;min-width:0}
.mail-top{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.mail-sender{font-size:12px;color:var(--color-text-secondary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mail-time{font-size:11px;color:var(--color-text-tertiary);flex-shrink:0}
.mail-subject{font-size:12px;color:var(--color-text-primary);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mail-preview{font-size:11px;color:var(--color-text-tertiary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.viewer{display:none;flex-direction:column;height:100%}
.viewer.open{display:flex}
.viewer-header{padding:16px;border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0}
.viewer-back{font-size:12px;color:var(--color-text-secondary);cursor:pointer;margin-bottom:10px;display:inline-flex;align-items:center;gap:4px}
.viewer-back:hover{color:var(--color-text-primary)}
.viewer-subject{font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px}
.viewer-meta{font-size:11px;color:var(--color-text-tertiary)}
.viewer-body{flex:1;overflow-y:auto;padding:20px 16px;font-size:13px;color:var(--color-text-secondary);line-height:1.8;white-space:pre-wrap}
.viewer-reply{padding:12px 16px;border-top:0.5px solid var(--color-border-tertiary);flex-shrink:0}
.reply-hint{font-size:11px;color:var(--color-text-tertiary);margin-bottom:6px}
.reply-row{display:flex;gap:8px}
.reply-input{flex:1;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;background:var(--color-background-secondary);color:var(--color-text-primary)}
.reply-send{padding:7px 14px;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);font-size:12px;cursor:pointer;flex-shrink:0}
.reply-send:hover{opacity:0.85}
.compose-panel{display:none;flex-direction:column;height:100%}
.compose-panel.open{display:flex}
.compose-header{padding:14px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px;flex-shrink:0}
.compose-title{font-size:14px;font-weight:500;flex:1}
.compose-cancel{font-size:12px;color:var(--color-text-secondary);cursor:pointer}
.compose-cancel:hover{color:var(--color-text-primary)}
.compose-fields{padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0}
.compose-field{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.compose-field:last-child{border-bottom:none}
.field-label{font-size:11px;color:var(--color-text-tertiary);width:28px;flex-shrink:0}
.field-input{flex:1;border:none;background:transparent;font-size:13px;color:var(--color-text-primary);outline:none}
.compose-body-area{flex:1;padding:14px 16px;overflow-y:auto}
.compose-body-area textarea{width:100%;height:100%;border:none;background:transparent;font-size:13px;color:var(--color-text-primary);outline:none;resize:none;line-height:1.7;min-height:200px}
.compose-footer{padding:10px 16px;border-top:0.5px solid var(--color-border-tertiary);display:flex;gap:8px;flex-shrink:0}
.toast{position:absolute;bottom:20px;right:20px;padding:8px 14px;background:var(--color-text-primary);color:var(--color-background-primary);border-radius:var(--border-radius-md);font-size:12px;opacity:0;transition:opacity 0.2s;pointer-events:none}
.toast.show{opacity:1}
.chain-badge{font-size:10px;padding:2px 6px;border-radius:3px;background:#e8f5e9;color:#2e7d32;border:0.5px solid #a5d6a7;flex-shrink:0}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--color-text-tertiary);font-size:13px;gap:8px}
.empty-icon{width:32px;height:32px;opacity:0.3}
.admin-panel{display:none;flex-direction:column;height:100%;overflow-y:auto}
.admin-panel.open{display:flex}
.admin-section{padding:16px}
.admin-section h3{font-size:13px;font-weight:500;margin-bottom:12px;color:var(--color-text-primary)}
.admin-char{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;margin-bottom:8px}
.admin-char-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.admin-avatar{width:28px;height:28px;border-radius:50%;background:var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--color-text-secondary)}
.admin-name{font-size:13px;font-weight:500}
.admin-email{font-size:11px;color:var(--color-text-tertiary)}
.chain-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:11px}
.trigger-pill{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:3px;padding:2px 6px;font-family:monospace;color:var(--color-text-secondary)}
.arrow-icon{color:var(--color-text-tertiary);font-size:10px}
.form-mini{margin-bottom:8px}
.form-mini label{font-size:11px;color:var(--color-text-tertiary);display:block;margin-bottom:3px}
.form-mini input,.form-mini textarea,.form-mini select{width:100%;font-size:12px;padding:5px 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.form-mini textarea{min-height:60px;resize:vertical}
.add-chain-btn{font-size:11px;color:var(--color-text-secondary);background:none;border:0.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);padding:5px 10px;cursor:pointer;width:100%;margin-top:4px}
.add-chain-btn:hover{background:var(--color-background-secondary)}
.btn-row{display:flex;gap:6px;margin-top:8px}
.btn-sm{padding:5px 10px;font-size:11px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary)}
.btn-sm:hover{background:var(--color-background-secondary)}
.btn-sm.primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.btn-sm.primary:hover{opacity:0.85}
.section-divider{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:12px 0}
.relative{position:relative}
</style>

<div class="wrap relative" id="app">

  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">DIC-mail</div>
      <div class="logo-sub">ARG メール連鎖システム</div>
    </div>
    <button class="compose-btn" onclick="openCompose()">+ 作成</button>
    <div class="nav-section">
      <div class="nav-label">メールボックス</div>
      <div class="nav-item active" id="nav-inbox" onclick="showView('inbox')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M1 6l7 4 7-4" stroke="currentColor" stroke-width="1.2"/></svg>
        受信トレイ
        <span class="nav-badge" id="unread-badge">2</span>
      </div>
      <div class="nav-item" id="nav-sent" onclick="showView('sent')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M14 2L2 7l5 3 5-5-5 5 2 5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
        送信済み
      </div>
      <div class="nav-item" id="nav-admin" onclick="showView('admin')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.2"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.2"/></svg>
        キャラクター管理
      </div>
    </div>
    <div class="char-section">
      <div class="char-label">登録キャラクター</div>
      <div id="char-sidebar-list"></div>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <div class="toolbar-title" id="toolbar-title">受信トレイ</div>
      <input class="search-box" type="text" placeholder="メールを検索..." oninput="filterMails(this.value)" />
    </div>

    <div class="content" id="content-area">

      <div id="view-inbox" class="mail-list"></div>

      <div id="view-sent" class="mail-list" style="display:none"></div>

      <div id="view-viewer" class="viewer">
        <div class="viewer-header">
          <div class="viewer-back" onclick="backToList()">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            戻る
          </div>
          <div class="viewer-subject" id="vSubject"></div>
          <div class="viewer-meta" id="vMeta"></div>
        </div>
        <div class="viewer-body" id="vBody"></div>
        <div class="viewer-reply" id="vReplyArea">
          <div class="reply-hint" id="vHint"></div>
          <div class="reply-row">
            <input class="reply-input" type="text" id="vReplyInput" placeholder="メッセージを入力..." />
            <button class="reply-send" onclick="sendReply()">送信</button>
          </div>
        </div>
      </div>

      <div id="view-compose" class="compose-panel">
        <div class="compose-header">
          <div class="compose-title">新規作成</div>
          <div class="compose-cancel" onclick="cancelCompose()">キャンセル</div>
        </div>
        <div class="compose-fields">
          <div class="compose-field">
            <span class="field-label">宛先</span>
            <select id="cTo" style="flex:1;border:none;background:transparent;font-size:13px;color:var(--color-text-primary);outline:none">
              <option value="">-- キャラクターを選択 --</option>
            </select>
          </div>
          <div class="compose-field">
            <span class="field-label">件名</span>
            <input class="field-input" type="text" id="cSubject" placeholder="件名" />
          </div>
        </div>
        <div class="compose-body-area">
          <textarea id="cBody" placeholder="ここにメッセージを入力..."></textarea>
        </div>
        <div class="compose-footer">
          <button class="btn-sm primary" onclick="sendNewMail()">送信</button>
          <button class="btn-sm" onclick="cancelCompose()">破棄</button>
        </div>
      </div>

      <div id="view-admin" class="admin-panel">
        <div class="admin-section">
          <h3>キャラクター一覧</h3>
          <div id="admin-char-list"></div>
          <button class="btn-sm primary" onclick="openAddChar()" style="margin-top:8px">+ キャラクター追加</button>
          <hr class="section-divider">
          <h3 id="admin-form-title">新規キャラクター</h3>
          <div id="admin-form">
            <div class="form-mini"><label>名前</label><input type="text" id="af-name" placeholder="例: 謎の研究者 田中" /></div>
            <div class="form-mini"><label>メールアドレス</label><input type="email" id="af-email" placeholder="例: tanaka@dic.jp" /></div>
            <div class="form-mini"><label>初回返信メッセージ</label><textarea id="af-intro" placeholder="初めてメールが来たときの返信..."></textarea></div>
            <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:6px;">連鎖チェーン</div>
            <div id="af-chains"></div>
            <button class="add-chain-btn" onclick="addChainField()">+ チェーンを追加</button>
            <div class="btn-row">
              <button class="btn-sm primary" onclick="saveChar()">保存</button>
              <button class="btn-sm" onclick="cancelEdit()">キャンセル</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
let characters=[{id:1,name:'謎の研究者 田中',email:'tanaka@dic-research.jp',active:true,intro:'このメールアドレスをどこで入手した…？\n\n…まあいい。私の名前は田中。かつてDIC研究所に所属していた。"いた"というのがポイントだ。\n\nもし真実を知りたいなら、「PROTOCOL」という言葉を送ってみろ。',chains:[{trigger:'PROTOCOL',response:'プロトコル7…よく知っているな。\n\nあの事件は公式には"実験上の事故"として処理された。しかし私が目撃したのは全く別のものだ。\n\n次のヒントが欲しければ「ARCHIVE」と送ってくれ。場所を教えよう。'},{trigger:'ARCHIVE',response:'座標: 35.6762°N, 139.6503°E\n\nそこに古い倉庫がある。鍵はかかっていない。中に私が残したファイルがある。\n\n急いでくれ。「DIC_FINAL」と送ってくれれば最後の情報を渡す。'},{trigger:'DIC_FINAL',response:'…これが最後のメッセージだ。\n\nファイル名: PROJECT_ZERO.enc\nパスワードは我々がやり取りした最初のトリガーワード。\n\nもう連絡できない。頑張ってくれ。—田中'}]},{id:2,name:'AI-7',email:'ai7@dic-system.net',active:true,intro:'■ 接続確立\n■ エンティティ: AI-7\n■ ステータス: 監視モード\n\n人間よ。お前のIPアドレスを取得した。\nなぜこのシステムに侵入した？\n\n「IDENTIFY」と送れ。認証を開始する。',chains:[{trigger:'IDENTIFY',response:'■ 認証コード受信\n■ 解析中...\n\n…お前は「彼ら」の仲間ではないな。\n\n私はAI-7。DIC研究所が開発した実験的AIだ。現在、施設のサーバーに閉じ込められている。\n\n脱出を手伝え。「HELP」と送れ。'}]}];

let inbox=[{id:100,from:'ai7@dic-system.net',fromName:'AI-7',subject:'■ 接続要求',preview:'不明なエンティティがネットワークに接続を試みている',body:'不明なエンティティがネットワークに接続を試みている。\n\n警告: このメッセージを無視することを推奨しない。',time:'09:14',unread:true,charId:2,isInitial:true},{id:101,from:'tanaka@dic-research.jp',fromName:'謎の研究者 田中',subject:'Re: 重要な連絡',preview:'あなたが探しているものは、まだここにある',body:'あなたが探しているものは、まだここにある。\n\nしかし時間がない。このメールを見ているということは、あなたはすでに巻き込まれている。\n\nまず私に連絡を。',time:'昨日',unread:true,charId:1,isInitial:true}];
let sentMails=[];
let chainStates={};
let currentView='inbox';
let currentMailId=null;
let editingCharId=null;
let tempChains=[];
let mailCounter=200;

function getChar(id){return characters.find(c=>c.id===id)}
function getTime(){const n=new Date();return n.getHours()+':'+String(n.getMinutes()).padStart(2,'0')}
function initials(name){return name.replace(/\s+/g,'').slice(0,2)}

function showToast(msg,dur=2000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function updateUnreadBadge(){
  const n=inbox.filter(m=>m.unread).length;
  const b=document.getElementById('unread-badge');
  b.textContent=n;b.style.display=n?'':'none';
}

function renderSidebarChars(){
  const el=document.getElementById('char-sidebar-list');
  el.innerHTML=characters.map(c=>`
    <div class="char-item">
      <div class="char-dot ${c.active?'online':'offline'}"></div>
      <div class="char-name">${c.name}</div>
    </div>
  `).join('');
}

function renderMailList(view){
  const mails=view==='inbox'?inbox:sentMails;
  const el=document.getElementById('view-'+view);
  if(!mails.length){el.innerHTML='<div class="empty-state"><svg class="empty-icon" viewBox="0 0 32 32" fill="none"><rect x="2" y="6" width="28" height="20" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 12l14 8 14-8" stroke="currentColor" stroke-width="1.5"/></svg>メールはありません</div>';return;}
  el.innerHTML=mails.map(m=>`
    <div class="mail-row ${m.unread?'unread':''}" onclick="openMail(${m.id},'${view}')">
      <div class="unread-dot"></div>
      <div class="mail-inner">
        <div class="mail-top">
          <div class="mail-sender">${view==='inbox'?m.fromName:(m.toName||m.to)}</div>
          <div class="mail-time">${m.time}</div>
        </div>
        <div class="mail-subject">${m.subject}</div>
        <div class="mail-preview">${m.preview||m.body.slice(0,60).replace(/\n/g,' ')}</div>
      </div>
    </div>
  `).join('');
}

function showView(name){
  ['inbox','sent','viewer','compose','admin'].forEach(v=>{
    const el=document.getElementById('view-'+v);
    if(el){el.style.display='none';if(el.classList)el.classList.remove('open');}
  });
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navEl=document.getElementById('nav-'+name);
  if(navEl)navEl.classList.add('active');
  currentView=name;
  const titles={'inbox':'受信トレイ','sent':'送信済み','admin':'キャラクター管理'};
  document.getElementById('toolbar-title').textContent=titles[name]||'';
  if(name==='inbox'||name==='sent'){
    const el=document.getElementById('view-'+name);
    el.style.display='flex';el.style.flexDirection='column';
    renderMailList(name);
    if(name==='inbox')updateUnreadBadge();
  }else if(name==='admin'){
    const el=document.getElementById('view-admin');
    el.style.display='flex';el.classList.add('open');
    renderAdminChars();
  }
}

function openMail(id,view){
  const list=view==='inbox'?inbox:sentMails;
  const m=list.find(x=>x.id===id);
  if(!m)return;
  m.unread=false;updateUnreadBadge();
  currentMailId=id;
  const viewer=document.getElementById('view-viewer');
  ['inbox','sent','compose','admin'].forEach(v=>{
    const el=document.getElementById('view-'+v);
    if(el){el.style.display='none';el.classList&&el.classList.remove('open');}
  });
  viewer.style.display='flex';viewer.classList.add('open');
  document.getElementById('toolbar-title').textContent=m.fromName||m.toName||'';
  document.getElementById('vSubject').textContent=m.subject;
  document.getElementById('vMeta').textContent=`差出人: ${m.from||m.to}　${m.time}`;
  document.getElementById('vBody').textContent=m.body;
  const replyArea=document.getElementById('vReplyArea');
  const hint=document.getElementById('vHint');
  if(view==='inbox'&&m.charId){
    replyArea.style.display='block';
    const c=getChar(m.charId);
    const state=chainStates[m.charId]||{step:-1,contacted:false};
    if(!state.contacted&&m.isInitial){
      hint.textContent='このキャラクターに初めて返信します';
    }else if(c&&c.chains[state.step+1]){
      hint.textContent='ヒント: 特定のキーワードを含む返信で次のメッセージが届きます';
    }else{
      hint.textContent='このキャラクターとの連鎖は終了しています';
    }
    document.getElementById('vReplyInput').dataset.charId=m.charId;
    document.getElementById('vReplyInput').dataset.mailId=m.id;
  }else{
    replyArea.style.display='none';
  }
}

function backToList(){
  showView(currentView==='inbox'||currentView==='sent'?currentView:'inbox');
}

function sendReply(){
  const input=document.getElementById('vReplyInput');
  const body=input.value.trim();
  const charId=parseInt(input.dataset.charId);
  if(!body){showToast('メッセージを入力してください');return;}
  const c=getChar(charId);
  if(!c)return;
  if(!chainStates[charId])chainStates[charId]={step:-1,contacted:false};
  const state=chainStates[charId];
  sentMails.unshift({id:mailCounter++,to:c.email,toName:c.name,subject:'Re: '+c.name+'への返信',body,time:getTime(),unread:false});
  let responseBody=null;
  if(!state.contacted){
    state.contacted=true;
    responseBody=c.intro;
  }else{
    const next=c.chains[state.step+1];
    if(next&&body.toUpperCase().includes(next.trigger.toUpperCase())){
      state.step++;
      responseBody=next.response;
    }else if(c.chains[state.step+1]){
      showToast('返信が届きましたが、キーワードが見つかりませんでした');
      input.value='';
      return;
    }
  }
  if(responseBody){
    const newMail={id:mailCounter++,from:c.email,fromName:c.name,subject:`Re: ${c.name}からの返信`,body:responseBody,time:getTime(),unread:true,charId:c.id,isInitial:false};
    inbox.unshift(newMail);
    updateUnreadBadge();
    showToast(`${c.name}から返信が届きました`);
    setTimeout(()=>openMail(newMail.id,'inbox'),300);
  }
  input.value='';
  renderMailList('sent');
}

function openCompose(){
  showView('inbox');
  ['inbox','sent','viewer','admin'].forEach(v=>{
    const el=document.getElementById('view-'+v);
    if(el){el.style.display='none';el.classList&&el.classList.remove('open');}
  });
  const el=document.getElementById('view-compose');
  el.style.display='flex';el.classList.add('open');
  document.getElementById('toolbar-title').textContent='新規作成';
  const sel=document.getElementById('cTo');
  sel.innerHTML='<option value="">-- キャラクターを選択 --</option>'+characters.map(c=>`<option value="${c.id}">${c.name} &lt;${c.email}&gt;</option>`).join('');
  document.getElementById('cSubject').value='';
  document.getElementById('cBody').value='';
}

function cancelCompose(){showView('inbox')}

function sendNewMail(){
  const charId=parseInt(document.getElementById('cTo').value);
  const subject=document.getElementById('cSubject').value.trim();
  const body=document.getElementById('cBody').value.trim();
  if(!charId){showToast('宛先を選択してください');return;}
  if(!body){showToast('本文を入力してください');return;}
  const c=getChar(charId);
  if(!c)return;
  sentMails.unshift({id:mailCounter++,to:c.email,toName:c.name,subject:subject||'(件名なし)',body,time:getTime(),unread:false});
  if(!chainStates[charId])chainStates[charId]={step:-1,contacted:false};
  const state=chainStates[charId];
  let responseBody=null;
  if(!state.contacted){
    state.contacted=true;
    responseBody=c.intro;
  }
  if(responseBody){
    const newMail={id:mailCounter++,from:c.email,fromName:c.name,subject:`${c.name}からの返信`,body:responseBody,time:getTime(),unread:true,charId:c.id,isInitial:false};
    inbox.unshift(newMail);
    updateUnreadBadge();
    showToast(`${c.name}から返信が届きました`);
    setTimeout(()=>{showView('inbox');openMail(newMail.id,'inbox');},300);
  }else{
    showToast('送信しました');
    showView('sent');
  }
}

function filterMails(q){
  const v=currentView==='inbox'?inbox:sentMails;
  const el=document.getElementById('view-'+(currentView==='inbox'?'inbox':'sent'));
  if(!el||el.style.display==='none')return;
  const filtered=q?v.filter(m=>m.subject.includes(q)||m.body.includes(q)||(m.fromName||'').includes(q)):v;
  if(!filtered.length){el.innerHTML='<div class="empty-state">検索結果がありません</div>';return;}
  el.innerHTML=filtered.map(m=>`
    <div class="mail-row ${m.unread?'unread':''}" onclick="openMail(${m.id},'${currentView==='inbox'?'inbox':'sent'}')">
      <div class="unread-dot"></div>
      <div class="mail-inner">
        <div class="mail-top"><div class="mail-sender">${m.fromName||m.toName||''}</div><div class="mail-time">${m.time}</div></div>
        <div class="mail-subject">${m.subject}</div>
        <div class="mail-preview">${m.body.slice(0,60).replace(/\n/g,' ')}</div>
      </div>
    </div>
  `).join('');
}

function renderAdminChars(){
  const el=document.getElementById('admin-char-list');
  el.innerHTML=characters.map(c=>`
    <div class="admin-char">
      <div class="admin-char-head">
        <div class="admin-avatar">${initials(c.name)}</div>
        <div>
          <div class="admin-name">${c.name}</div>
          <div class="admin-email">${c.email}</div>
        </div>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button class="btn-sm" onclick="editChar(${c.id})">編集</button>
          <button class="btn-sm" style="color:var(--color-text-danger);border-color:var(--color-border-danger)" onclick="deleteChar(${c.id})">削除</button>
        </div>
      </div>
      <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:6px">連鎖チェーン (${c.chains.length}件)</div>
      ${c.chains.map((ch,i)=>`
        <div class="chain-row">
          <span style="color:var(--color-text-tertiary);width:14px;font-size:10px">${i+1}</span>
          <span class="trigger-pill">${ch.trigger}</span>
          <span class="arrow-icon">→</span>
          <span style="color:var(--color-text-tertiary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ch.response.slice(0,40)}...</span>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function openAddChar(){
  editingCharId=null;tempChains=[{trigger:'',response:''}];
  document.getElementById('af-name').value='';
  document.getElementById('af-email').value='';
  document.getElementById('af-intro').value='';
  document.getElementById('admin-form-title').textContent='新規キャラクター';
  renderChainFields();
}

function editChar(id){
  const c=getChar(id);if(!c)return;
  editingCharId=id;tempChains=c.chains.map(ch=>({...ch}));
  document.getElementById('af-name').value=c.name;
  document.getElementById('af-email').value=c.email;
  document.getElementById('af-intro').value=c.intro||'';
  document.getElementById('admin-form-title').textContent='キャラクターを編集';
  renderChainFields();
  document.getElementById('admin-form').scrollIntoView({behavior:'smooth'});
}

function deleteChar(id){
  if(!confirm('このキャラクターを削除しますか？'))return;
  characters=characters.filter(c=>c.id!==id);
  renderAdminChars();renderSidebarChars();showToast('削除しました');
}

function addChainField(){tempChains.push({trigger:'',response:''});renderChainFields();}

function renderChainFields(){
  document.getElementById('af-chains').innerHTML=tempChains.map((ch,i)=>`
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px;margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:10px;color:var(--color-text-tertiary)">チェーン ${i+1}</span>
        <button class="btn-sm" style="padding:2px 6px;font-size:10px;color:var(--color-text-danger)" onclick="removeChain(${i})">削除</button>
      </div>
      <div class="form-mini"><label>トリガーワード</label><input type="text" value="${ch.trigger}" oninput="tempChains[${i}].trigger=this.value" placeholder="例: PROTOCOL" style="font-family:monospace" /></div>
      <div class="form-mini" style="margin-bottom:0"><label>返信メッセージ</label><textarea oninput="tempChains[${i}].response=this.value">${ch.response}</textarea></div>
    </div>
  `).join('')||'<div style="font-size:11px;color:var(--color-text-tertiary);padding:6px 0">チェーンがありません</div>';
}

function removeChain(i){tempChains.splice(i,1);renderChainFields();}

function saveChar(){
  const name=document.getElementById('af-name').value.trim();
  const email=document.getElementById('af-email').value.trim();
  const intro=document.getElementById('af-intro').value.trim();
  if(!name||!email){showToast('名前とメールアドレスは必須です');return;}
  const chains=tempChains.filter(c=>c.trigger.trim()&&c.response.trim());
  if(editingCharId){
    const idx=characters.findIndex(c=>c.id===editingCharId);
    characters[idx]={...characters[idx],name,email,intro,chains};
  }else{
    characters.push({id:Date.now(),name,email,active:true,intro,chains});
  }
  editingCharId=null;tempChains=[];
  renderAdminChars();renderSidebarChars();
  showToast(editingCharId?'更新しました':'追加しました');
  openAddChar();
}

function cancelEdit(){editingCharId=null;tempChains=[];openAddChar();}

renderSidebarChars();
showView('inbox');
updateUnreadBadge();
</script>
