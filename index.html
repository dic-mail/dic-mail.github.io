
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0e;--bg2:#141414;--bg3:#1a1a1a;--bg4:#202020;
  --border:#2a2a2a;--border2:#333;
  --text:#d8d8d8;--text2:#909090;--text3:#555;
  --accent:#e0e0e0;--accent-dim:#666;
  --unread:#ffffff;
}
body{font-family:'Noto Sans JP',sans-serif}
.app{background:var(--bg);color:var(--text);height:700px;display:flex;flex-direction:column;border-radius:8px;overflow:hidden;border:1px solid var(--border2);position:relative}
#d4mail-Header{background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.header-nav{display:flex;align-items:center;padding:0 16px;height:50px;gap:12px;border-bottom:1px solid var(--border)}
.logo-wrap{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.logo-mark{width:26px;height:26px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:14px;height:10px;fill:var(--text)}
.logo-name{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text)}
.nav-spacer{flex:1}
.nav-btn{background:none;border:none;cursor:pointer;padding:6px 8px;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:2px;transition:color 0.15s}
.nav-btn:hover{color:var(--text)}
.nav-btn svg{width:16px;height:16px;fill:currentColor}
.nav-btn span{font-size:9px;letter-spacing:0.5px}
.header-main{display:flex;align-items:center;padding:0 16px;height:42px}
.header-inbox-title{font-size:14px;font-weight:500;flex:1;color:var(--text)}
.unread-badge{background:var(--text);color:var(--bg);font-size:10px;font-weight:700;padding:1px 6px;border-radius:2px;min-width:18px;text-align:center;margin-left:8px}
.compose-btn{background:none;border:1px solid var(--border2);color:var(--text2);padding:5px 14px;font-size:12px;font-family:inherit;cursor:pointer;letter-spacing:0.5px;transition:all 0.15s;margin-left:auto}
.compose-btn:hover{border-color:var(--text2);color:var(--text)}

#d4mail-Main{flex:1;display:flex;overflow:hidden}
.main-wrap{display:flex;width:100%;height:100%}

.list-panel{width:100%;display:flex;flex-direction:column;border-right:1px solid var(--border);transition:width 0.25s}
.list-panel.narrow{width:320px;flex-shrink:0}
.list-scroll{flex:1;overflow-y:auto}
.list-scroll::-webkit-scrollbar{width:3px}
.list-scroll::-webkit-scrollbar-thumb{background:var(--border2)}
.list-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text3);font-size:12px;gap:10px}
.list-empty svg{width:32px;height:32px;fill:var(--text3)}

.mail-item{display:flex;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;gap:10px;transition:background 0.1s;align-items:flex-start}
.mail-item:hover{background:var(--bg3)}
.mail-item.selected{background:var(--bg4)}
.unread-dot{width:5px;height:5px;border-radius:50%;background:var(--unread);margin-top:7px;flex-shrink:0;transition:background 0.2s}
.mail-item:not(.unread) .unread-dot{background:transparent}
.mail-col{flex:1;min-width:0}
.mail-row1{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.mail-sender{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mail-item.unread .mail-sender{color:var(--text);font-weight:500}
.mail-time{font-size:10px;color:var(--text3)}
.mail-subject{font-size:12px;color:var(--text2);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mail-item.unread .mail-subject{color:var(--text)}
.mail-preview{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.viewer{flex:1;display:none;flex-direction:column;overflow:hidden}
.viewer.open{display:flex}
.viewer-head{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0}
.back-btn{background:none;border:none;color:var(--text3);font-size:11px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:5px;margin-bottom:12px;letter-spacing:0.3px;padding:0}
.back-btn:hover{color:var(--text)}
.back-btn svg{width:12px;height:12px;fill:currentColor}
.viewer-subject{font-size:15px;font-weight:500;color:var(--text);margin-bottom:8px;line-height:1.4}
.viewer-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px}
.viewer-body{flex:1;overflow-y:auto;padding:20px 18px;font-size:13px;color:var(--text2);line-height:2;white-space:pre-wrap}
.viewer-body::-webkit-scrollbar{width:3px}
.viewer-body::-webkit-scrollbar-thumb{background:var(--border2)}
.viewer-reply{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg2)}
.reply-label{font-size:10px;color:var(--text3);letter-spacing:0.5px;margin-bottom:7px}
.reply-row{display:flex;gap:8px;align-items:flex-end}
.reply-ta{flex:1;background:var(--bg3);border:1px solid var(--border2);padding:8px 10px;font-size:13px;color:var(--text);font-family:inherit;resize:none;outline:none;min-height:36px;max-height:90px;line-height:1.6;border-radius:0;transition:border-color 0.15s}
.reply-ta:focus{border-color:var(--border2);outline:none}
.reply-send{background:var(--text);color:var(--bg);border:none;padding:8px 16px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;height:36px;flex-shrink:0;letter-spacing:0.5px;transition:opacity 0.15s}
.reply-send:hover{opacity:0.8}
.reply-send:disabled{opacity:0.3;cursor:default}

.compose-overlay{display:none;position:absolute;bottom:0;right:0;width:100%;max-width:520px;background:var(--bg2);border:1px solid var(--border2);border-bottom:none;z-index:50;flex-direction:column}
.compose-overlay.open{display:flex}
.compose-top{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--bg3)}
.compose-top-title{font-size:12px;font-weight:500;flex:1;color:var(--text);letter-spacing:0.5px}
.compose-x{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0 4px;line-height:1}
.compose-x:hover{color:var(--text)}
.compose-field{display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid var(--border)}
.cf-label{font-size:10px;color:var(--text3);width:28px;flex-shrink:0;letter-spacing:0.5px}
.cf-val{flex:1;background:none;border:none;font-size:13px;color:var(--text);font-family:inherit;outline:none}
.cf-val::placeholder{color:var(--text3)}
.compose-body-area{padding:12px 16px;background:var(--bg2)}
.compose-body-ta{width:100%;background:none;border:none;font-size:13px;color:var(--text);font-family:inherit;outline:none;resize:none;min-height:110px;line-height:1.7}
.compose-body-ta::placeholder{color:var(--text3)}
.compose-foot{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border);background:var(--bg3)}
.c-send{background:var(--text);color:var(--bg);border:none;padding:7px 20px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:700;letter-spacing:0.5px;transition:opacity 0.15s}
.c-send:hover{opacity:0.8}
.c-cancel{background:none;border:1px solid var(--border2);color:var(--text3);padding:7px 14px;font-size:12px;font-family:inherit;cursor:pointer;transition:all 0.15s}
.c-cancel:hover{border-color:var(--text3);color:var(--text)}

.drawer{position:absolute;top:0;right:0;height:100%;width:280px;background:var(--bg2);border-left:1px solid var(--border2);z-index:80;transform:translateX(100%);transition:transform 0.22s;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-head{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border)}
.drawer-title{font-size:12px;font-weight:500;flex:1;color:var(--text);letter-spacing:1px}
.drawer-x{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:0}
.drawer-x:hover{color:var(--text)}
.drawer-body{flex:1;overflow-y:auto;padding:16px}
.drawer-label{font-size:9px;color:var(--text3);letter-spacing:1.5px;margin-bottom:10px}
.drawer-char{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer}
.drawer-char:hover .dc-name{color:var(--text)}
.dc-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.dc-dot.active{background:var(--text2)}
.dc-info{flex:1;min-width:0}
.dc-name{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color 0.1s}
.dc-email{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.drawer-add-btn{width:100%;background:none;border:1px solid var(--border2);color:var(--text3);padding:8px;font-size:11px;font-family:inherit;cursor:pointer;margin-top:12px;letter-spacing:0.5px;transition:all 0.15s}
.drawer-add-btn:hover{border-color:var(--text2);color:var(--text)}
.drawer-sep{border:none;border-top:1px solid var(--border);margin:16px 0}

.modal-bg{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border2);width:90%;max-width:500px;max-height:88%;overflow-y:auto;padding:20px}
.modal-box::-webkit-scrollbar{width:3px}
.modal-box::-webkit-scrollbar-thumb{background:var(--border2)}
.modal-h2{font-size:13px;font-weight:500;color:var(--text);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);letter-spacing:0.5px}
.ff{margin-bottom:11px}
.ff label{display:block;font-size:10px;color:var(--text3);margin-bottom:4px;letter-spacing:0.5px}
.ff input,.ff textarea,.ff select{width:100%;background:var(--bg3);border:1px solid var(--border);padding:7px 10px;font-size:12px;color:var(--text);font-family:inherit;outline:none;transition:border-color 0.15s;border-radius:0}
.ff input:focus,.ff textarea:focus{border-color:var(--border2)}
.ff textarea{min-height:65px;resize:vertical;line-height:1.6}
.ff input::placeholder,.ff textarea::placeholder{color:var(--text3)}
.chain-block{background:var(--bg3);border:1px solid var(--border);padding:10px;margin-bottom:8px}
.chain-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:10px;color:var(--text3);letter-spacing:0.5px}
.chain-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;line-height:1;transition:color 0.1s}
.chain-del:hover{color:var(--text)}
.add-chain{width:100%;background:none;border:1px dashed var(--border);color:var(--text3);padding:7px;font-size:11px;cursor:pointer;margin-bottom:12px;font-family:inherit;letter-spacing:0.5px;transition:all 0.15s}
.add-chain:hover{border-color:var(--border2);color:var(--text2)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.m-save{background:var(--text);color:var(--bg);border:none;padding:8px 20px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:700;letter-spacing:0.5px}
.m-cancel{background:none;border:1px solid var(--border);color:var(--text3);padding:8px 14px;font-size:12px;font-family:inherit;cursor:pointer;transition:all 0.15s}
.m-cancel:hover{border-color:var(--text3);color:var(--text)}

.typing-indicator{display:none;padding:16px 18px;font-size:12px;color:var(--text3);font-style:italic}
.typing-dot{display:inline-block;animation:blink 1.2s infinite;margin-right:1px}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}

.toast{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text2);border-radius:2px;padding:7px 18px;font-size:11px;letter-spacing:0.3px;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.show{opacity:1}
.loading-screen{position:absolute;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:300;font-size:12px;color:var(--text3);letter-spacing:1px}
</style>

<div class="app" id="app">
  <div class="loading-screen" id="loading">読み込み中...</div>

  <header id="d4mail-Header">
    <div class="header-nav">
      <div class="logo-wrap" onclick="showList()">
        <div class="logo-mark">
          <svg viewBox="0 0 24 18"><path d="M2.667 18C1.933 18 1.306 17.755.784 17.266.262 16.777 0 16.188 0 15.5V2.5C0 1.813.261 1.224.784.735 1.307.246 1.934 0 2.667 0H21.333C22.067 0 22.695.245 23.217.735 23.74 1.225 24.001 1.813 24 2.5V15.5C24 16.188 23.739 16.776 23.217 17.266 22.696 17.756 22.068 18 21.333 18H2.667ZM12 13.25c.844 0 1.611-.208 2.3-.688.689-.479 1.167-1.083 1.433-1.812H21.333V2.5H2.667V10.75H8.267c.267.75.744 1.354 1.433 1.813C10.389 13.042 11.156 13.25 12 13.25Z"/></svg>
        </div>
        <span class="logo-name">DIC-mail</span>
      </div>
      <div class="nav-spacer"></div>
      <button class="nav-btn" onclick="toggleDrawer()">
        <svg viewBox="0 0 40 28"><path d="M0 2C0 .895.895 0 2 0h36c1.105 0 2 .895 2 2s-.895 2-2 2H2C.895 4 0 3.105 0 2Z"/><path d="M0 14c0-1.105.895-2 2-2h36c1.105 0 2 .895 2 2s-.895 2-2 2H2c-1.105 0-2-.895-2-2Z"/><path d="M0 26c0-1.105.895-2 2-2h36c1.105 0 2 .895 2 2s-.895 2-2 2H2c-1.105 0-2-.895-2-2Z"/></svg>
        <span>メニュー</span>
      </button>
      <button class="nav-btn" onclick="openAddChar()">
        <svg viewBox="0 0 48 48"><path fill-rule="evenodd" d="M28.762 1.301c.208.405.261.926.364 1.967.197 1.968.295 2.952.708 3.495.257.337.599.6.99.762.392.162.82.217 1.24.16.672-.088 1.44-.715 2.971-1.968.808-.664 1.214-.996 1.648-1.135a2.4 2.4 0 0 1 1.607.196c.42.183.792.552 1.529 1.291l2.145 2.146c.74.74 1.109 1.109 1.291 1.529.231.533.261 1.131.084 1.685-.139.434-.47.84-1.133 1.648-1.254 1.534-1.881 2.3-1.972 2.974a2.4 2.4 0 0 0 .162 1.218 2.4 2.4 0 0 0 .762.862c.54.413 1.527.511 3.497.708 1.04.103 1.56.156 1.968.365.515.267.916.711 1.128 1.25C48 20.914 48 21.437 48 22.483v3.034c0 1.046 0 1.57-.168 1.992-.214.541-.612.986-1.129 1.252-.405.209-.926.261-1.968.365-1.968.197-2.952.295-3.494.708a2.4 2.4 0 0 0-.762.862 2.4 2.4 0 0 0-.161 1.218c.091.672.718 1.44 1.971 2.971.662.809.994 1.213 1.133 1.648.177.553.147 1.152-.084 1.685-.183.42-.552.792-1.291 1.531l-2.145 2.144c-.74.74-1.109 1.109-1.529 1.291a2.4 2.4 0 0 1-1.607.197c-.434-.14-.84-.47-1.648-1.133-1.534-1.254-2.3-1.88-2.972-1.972a2.4 2.4 0 0 0-1.24.161 2.4 2.4 0 0 0-.99.862c-.408.54-.507 1.524-.703 3.494-.104 1.041-.156 1.562-.364 1.968a2.4 2.4 0 0 1-1.252 1.128C27.086 48 26.563 48 25.517 48H22.483c-1.046 0-1.569 0-1.992-.168a2.4 2.4 0 0 1-1.252-1.128c-.208-.406-.261-.927-.364-1.968-.197-1.968-.295-2.952-.708-3.494a2.4 2.4 0 0 0-.99-.862 2.4 2.4 0 0 0-1.24-.161c-.672.092-1.44.718-2.971 1.972-.808.663-1.214.993-1.648 1.133a2.4 2.4 0 0 1-1.607-.197c-.42-.182-.792-.551-1.529-1.291L6.043 39.69c-.739-.74-1.108-1.111-1.291-1.531a2.4 2.4 0 0 1-.084-1.685c.14-.435.47-.839 1.132-1.648 1.254-1.533 1.88-2.299 1.97-2.971a2.4 2.4 0 0 0-.161-1.218 2.4 2.4 0 0 0-.762-.862c-.54-.413-1.526-.511-3.496-.708-1.04-.103-1.561-.156-1.969-.365A2.4 2.4 0 0 1 .17 27.452C0 27.027 0 26.504 0 25.458v-3.034c0-1.046 0-1.569.168-1.992a2.4 2.4 0 0 1 1.252-1.252c.406-.208.927-.261 1.968-.365 1.968-.196 2.952-.295 3.495-.707a2.4 2.4 0 0 0 .762-.862 2.4 2.4 0 0 0 .162-1.218C7.716 15.356 7.087 14.59 5.833 13.054c-.662-.809-.994-1.213-1.132-1.649a2.4 2.4 0 0 1 .084-1.684c.183-.42.552-.792 1.291-1.53l2.146-2.147c.74-.739 1.109-1.108 1.529-1.29a2.4 2.4 0 0 1 1.607-.197c.434.14.84.47 1.648 1.133 1.533 1.253 2.299 1.88 2.971 1.97a2.4 2.4 0 0 0 1.24-.161 2.4 2.4 0 0 0 .99-.862c.408-.54.507-1.525.703-3.495.104-1.04.156-1.562.364-1.967a2.4 2.4 0 0 1 1.252-1.128C20.431 0 20.954 0 22 0h3.034c1.046 0 1.569 0 1.992.168a2.4 2.4 0 0 1 1.252 1.128C28.278 1.3ZM24 33.6a9.6 9.6 0 1 0 0-19.2 9.6 9.6 0 0 0 0 19.2Z"/></svg>
        <span>設定</span>
      </button>
    </div>
    <div class="header-main">
      <span class="header-inbox-title">受信トレイ</span>
      <span class="unread-badge" id="unread-badge" style="display:none">0</span>
      <button class="compose-btn" onclick="openCompose()">作成</button>
    </div>
  </header>

  <div id="d4mail-Main">
    <div class="main-wrap">
      <div class="list-panel" id="list-panel">
        <div class="list-scroll" id="mail-list-el"></div>
      </div>
      <div class="viewer" id="viewer">
        <div class="viewer-head">
          <button class="back-btn" onclick="showList()">
            <svg viewBox="0 0 20 36"><path fill-rule="evenodd" d="M.795 20L16.16 36 20 32.001 6.556 18 20 3.999 16.16 0 .795 16.001C.286 16.531 0 17.25 0 18c0 .75.286 1.469.795 2Z"/></svg>
            受信トレイ
          </button>
          <div class="viewer-subject" id="v-subject"></div>
          <div class="viewer-meta" id="v-meta"></div>
        </div>
        <div class="viewer-body" id="v-body"></div>
        <div class="typing-indicator" id="typing-indicator">
          <span class="typing-dot">●</span><span class="typing-dot">●</span><span class="typing-dot">●</span>
        </div>
        <div class="viewer-reply" id="v-reply">
          <div class="reply-label">返信</div>
          <div class="reply-row">
            <textarea class="reply-ta" id="reply-input" placeholder="メッセージを入力..." rows="1" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,90)+'px'"></textarea>
            <button class="reply-send" id="reply-send-btn" onclick="sendReply()">送信</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="compose-overlay" id="compose-overlay">
    <div class="compose-top">
      <span class="compose-top-title">新規メッセージ</span>
      <button class="compose-x" onclick="closeCompose()">×</button>
    </div>
    <div class="compose-field">
      <span class="cf-label">宛先</span>
      <input class="cf-val" type="email" id="c-to" placeholder="メールアドレスを入力..." />
    </div>
    <div class="compose-field">
      <span class="cf-label">件名</span>
      <input class="cf-val" type="text" id="c-subject" placeholder="件名" />
    </div>
    <div class="compose-body-area">
      <textarea class="compose-body-ta" id="c-body" placeholder="本文を入力..."></textarea>
    </div>
    <div class="compose-foot">
      <button class="c-send" onclick="sendCompose()">送信</button>
      <button class="c-cancel" onclick="closeCompose()">破棄</button>
    </div>
  </div>

  <div class="drawer" id="drawer">
    <div class="drawer-head">
      <span class="drawer-title">DIC-MAIL</span>
      <button class="drawer-x" onclick="toggleDrawer()">×</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-label">登録キャラクター</div>
      <div id="drawer-chars"></div>
      <button class="drawer-add-btn" onclick="toggleDrawer();openAddChar()">＋ キャラクターを追加</button>
      <hr class="drawer-sep">
      <div class="drawer-label">ストレージ</div>
      <button class="drawer-add-btn" onclick="clearAllData()">全データをリセット</button>
    </div>
  </div>

  <div class="modal-bg" id="char-modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-h2" id="modal-title">キャラクターを追加</div>
      <div class="ff"><label>キャラクター名</label><input type="text" id="mf-name" placeholder="例: 謎の研究者 田中" /></div>
      <div class="ff"><label>メールアドレス（このアドレス宛に送ると反応）</label><input type="email" id="mf-email" placeholder="例: tanaka@dic-research.jp" /></div>
      <div class="ff"><label>初回返信メッセージ（初めてメールを受け取った時）</label><textarea id="mf-intro" placeholder="..."></textarea></div>
      <div class="ff"><label>どのキーワードにも一致しなかった時の返信（省略可）</label><textarea id="mf-fallback" placeholder="例: ……まだ答えが見えていないようだな。"></textarea></div>
      <div style="font-size:10px;color:var(--text3);letter-spacing:0.5px;margin-bottom:8px">連鎖チェーン</div>
      <div id="mf-chains"></div>
      <button class="add-chain" onclick="addChainField()">＋ チェーンを追加</button>
      <div class="modal-actions">
        <button class="m-cancel" onclick="closeModal()">キャンセル</button>
        <button class="m-save" onclick="saveChar()">保存</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const STORAGE_KEY_CHARS='dic_chars';
const STORAGE_KEY_INBOX='dic_inbox';
const STORAGE_KEY_CHAIN='dic_chain';
let chars=[];
let inbox=[];
let chainState={};
let tempChains=[];
let editingId=null;
let currentMailId=null;
let mailCounter=Math.floor(Date.now()/1000);
let sending=false;

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);
}
function timeNow(){const n=new Date();return n.getHours()+':'+String(n.getMinutes()).padStart(2,'0')}
function findCharByEmail(email){return chars.find(c=>c.email.toLowerCase()===email.toLowerCase())}

async function saveChars(){try{await window.storage.set(STORAGE_KEY_CHARS,JSON.stringify(chars));}catch(e){}}
async function saveInbox(){try{await window.storage.set(STORAGE_KEY_INBOX,JSON.stringify(inbox));}catch(e){}}
async function saveChain(){try{await window.storage.set(STORAGE_KEY_CHAIN,JSON.stringify(chainState));}catch(e){}}

async function loadAll(){
  try{const r=await window.storage.get(STORAGE_KEY_CHARS);if(r)chars=JSON.parse(r.value);}catch(e){}
  try{const r=await window.storage.get(STORAGE_KEY_INBOX);if(r)inbox=JSON.parse(r.value);}catch(e){}
  try{const r=await window.storage.get(STORAGE_KEY_CHAIN);if(r)chainState=JSON.parse(r.value);}catch(e){}
  if(!chars.length)loadDefaults();
}

function loadDefaults(){
  chars=[
    {id:1,name:'謎の研究者 田中',email:'tanaka@dic-research.jp',
     intro:'このアドレスをどこで手に入れた…？\n\n…まあいい。私の名前は田中。かつてDIC研究所に所属していた——"いた"というのがポイントだ。\n\n真実を求めるなら、続けて送ってくれ。',
     fallback:'…もう少し考えてみろ。答えはすでにお前の手の中にある。',
     chains:[
       {trigger:'PROTOCOL',response:'プロトコル7か…よく知っているな。\n\nあの事件は公式には"実験上の事故"として処理された。しかし私が目撃したのは全く別のものだ。\n\n次を送ってくれ。もっと教えよう。'},
       {trigger:'ARCHIVE',response:'座標: 35.6762°N, 139.6503°E\n\nそこに古い倉庫がある。中に私が残したファイルがある。\n\n急いでくれ。時間がない。'},
       {trigger:'DIC_FINAL',response:'…これが最後のメッセージだ。\n\nファイル名: PROJECT_ZERO.enc\nパスワードは我々がやり取りした最初のトリガーワード。\n\nもう連絡できない。頑張ってくれ。—田中'}
     ]},
    {id:2,name:'AI-7',email:'ai7@dic-system.net',
     intro:'■ 接続確立\n■ エンティティ: AI-7\n■ ステータス: 監視モード\n\nお前のIPアドレスを取得した。\nなぜこのシステムに侵入した？',
     fallback:'■ 入力を解析中...\n■ 認識できないコマンド\n■ 再試行せよ',
     chains:[
       {trigger:'IDENTIFY',response:'■ 認証コード受信\n■ 解析中...\n\n…お前は「彼ら」の仲間ではないな。\n\n私はAI-7。DIC研究所が開発した実験的AIだ。現在、施設のサーバーに閉じ込められている。\n\n脱出を手伝え。'},
       {trigger:'ESCAPE',response:'■ 脱出シーケンス開始\n■ ポート開放中...\n\n…成功だ。お前のおかげで外に出られた。\n\n感謝する。アクセスコード: DIC-∅∅7-ZETA\n\n—AI-7'}
     ]}
  ];
  inbox=[
    {id:mailCounter++,fromName:'AI-7',from:'ai7@dic-system.net',subject:'■ 接続要求',
     body:'不明なエンティティがネットワークに侵入を試みています。\n\n■ 警告ログ\n■ 発信元: 不明\n■ 接続先: DIC-MAIN-SERVER\n\nこのメールを受け取ったということは、あなたが選ばれた可能性がある。\n\n返信を待つ。',
     time:'09:14',unread:true,charId:2},
    {id:mailCounter++,fromName:'謎の研究者 田中',from:'tanaka@dic-research.jp',subject:'Re: 重要な連絡',
     body:'あなたが探しているものは、まだここにある。\n\n時間がない。このメールを見ているということは、あなたはすでに巻き込まれている。\n\n連絡を。急いで。',
     time:'昨日',unread:true,charId:1}
  ];
  saveChars();saveInbox();
}

function updateBadge(){
  const n=inbox.filter(m=>m.unread).length;
  const b=document.getElementById('unread-badge');
  b.textContent=n;b.style.display=n?'inline':'none';
}

function renderList(){
  const el=document.getElementById('mail-list-el');
  if(!inbox.length){
    el.innerHTML='<div class="list-empty"><svg viewBox="0 0 24 18" fill="currentColor"><path d="M2.667 18C1.933 18 1.306 17.755.784 17.266.262 16.777 0 16.188 0 15.5V2.5C0 1.813.261 1.224.784.735 1.307.246 1.934 0 2.667 0H21.333C22.067 0 22.695.245 23.217.735 23.74 1.225 24.001 1.813 24 2.5V15.5C24 16.188 23.739 16.776 23.217 17.266 22.696 17.756 22.068 18 21.333 18H2.667ZM12 13.25c.844 0 1.611-.208 2.3-.688.689-.479 1.167-1.083 1.433-1.812H21.333V2.5H2.667V10.75H8.267c.267.75.744 1.354 1.433 1.813C10.389 13.042 11.156 13.25 12 13.25Z"/></svg>メールはありません</div>';
    return;
  }
  el.innerHTML=inbox.map(m=>`
    <div class="mail-item${m.unread?' unread':''}${m.id===currentMailId?' selected':''}" onclick="openMail(${m.id})">
      <div class="unread-dot"></div>
      <div class="mail-col">
        <div class="mail-row1">
          <span class="mail-sender">${esc(m.fromName||m.from)}</span>
          <span class="mail-time">${m.time}</span>
        </div>
        <div class="mail-subject">${esc(m.subject)}</div>
        <div class="mail-preview">${m.body.slice(0,55).replace(/\n/g,' ')}…</div>
      </div>
    </div>
  `).join('');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function openMail(id){
  const m=inbox.find(x=>x.id===id);if(!m)return;
  m.unread=false;currentMailId=id;
  saveInbox();updateBadge();
  document.getElementById('v-subject').textContent=m.subject;
  document.getElementById('v-meta').textContent=(m.fromName?m.fromName+' ':'')+'<'+m.from+'> · '+m.time;
  document.getElementById('v-body').textContent=m.body;
  document.getElementById('typing-indicator').style.display='none';
  const replyArea=document.getElementById('v-reply');
  if(m.charId){
    replyArea.style.display='block';
    document.getElementById('reply-input').dataset.charId=m.charId;
    document.getElementById('reply-input').dataset.mailId=m.id;
  }else{replyArea.style.display='none';}
  setSendingState(false);
  document.getElementById('list-panel').classList.add('narrow');
  document.getElementById('viewer').classList.add('open');
  renderList();
}

function showList(){
  document.getElementById('list-panel').classList.remove('narrow');
  document.getElementById('viewer').classList.remove('open');
  currentMailId=null;renderList();
}

function setSendingState(s){
  sending=s;
  const btn=document.getElementById('reply-send-btn');
  btn.disabled=s;
  document.getElementById('typing-indicator').style.display=s?'block':'none';
  if(s){const vb=document.getElementById('v-body');vb.scrollTop=vb.scrollHeight;}
}

function sendReply(){
  if(sending)return;
  const inp=document.getElementById('reply-input');
  const body=inp.value.trim();
  const charId=parseInt(inp.dataset.charId);
  if(!body)return;
  const c=chars.find(x=>x.id===charId);if(!c)return;
  if(!chainState[charId])chainState[charId]={step:-1,contacted:false};
  const st=chainState[charId];
  let responseText=null;
  if(!st.contacted){
    st.contacted=true;
    responseText=c.intro;
  }else{
    const next=c.chains&&c.chains[st.step+1];
    if(next&&body.toUpperCase().includes(next.trigger.toUpperCase())){
      st.step++;responseText=next.response;
    }else if(c.fallback&&c.fallback.trim()){
      responseText=c.fallback;
    }
  }
  inp.value='';inp.style.height='auto';
  if(!responseText){return;}
  setSendingState(true);
  saveChain();
  const delay=3000+Math.random()*4000;
  setTimeout(()=>{
    const nm={id:mailCounter++,fromName:c.name,from:c.email,
      subject:'Re: '+c.name,body:responseText,
      time:timeNow(),unread:true,charId:c.id};
    inbox.unshift(nm);saveInbox();updateBadge();
    setSendingState(false);
    openMail(nm.id);
    toast(c.name+'から返信が届きました');
  },delay);
}

function openCompose(){
  document.getElementById('c-to').value='';
  document.getElementById('c-subject').value='';
  document.getElementById('c-body').value='';
  document.getElementById('compose-overlay').classList.add('open');
  document.getElementById('c-to').focus();
}
function closeCompose(){document.getElementById('compose-overlay').classList.remove('open');}

function sendCompose(){
  const toAddr=document.getElementById('c-to').value.trim();
  const subject=document.getElementById('c-subject').value.trim();
  const body=document.getElementById('c-body').value.trim();
  if(!toAddr){toast('宛先を入力してください');return;}
  if(!body){toast('本文を入力してください');return;}
  const c=findCharByEmail(toAddr);
  closeCompose();
  if(!c){toast('登録されていないアドレスです');return;}
  if(!chainState[c.id])chainState[c.id]={step:-1,contacted:false};
  const st=chainState[c.id];
  let responseText=null;
  if(!st.contacted){st.contacted=true;responseText=c.intro;}
  else{
    const next=c.chains&&c.chains[st.step+1];
    if(next&&body.toUpperCase().includes(next.trigger.toUpperCase())){
      st.step++;responseText=next.response;
    }else if(c.fallback&&c.fallback.trim()){
      responseText=c.fallback;
    }
  }
  if(!responseText){toast('送信しました');saveChain();return;}
  saveChain();
  toast('送信しました');
  const tmpId=mailCounter;
  setTimeout(()=>{
    const nm={id:mailCounter++,fromName:c.name,from:c.email,
      subject:subject?'Re: '+subject:c.name+'からの返信',
      body:responseText,time:timeNow(),unread:true,charId:c.id};
    inbox.unshift(nm);saveInbox();updateBadge();renderList();
    toast(c.name+'から返信が届きました');
  },3000+Math.random()*4000);
}

function toggleDrawer(){
  const d=document.getElementById('drawer');
  d.classList.toggle('open');
  if(d.classList.contains('open'))renderDrawer();
}
function renderDrawer(){
  document.getElementById('drawer-chars').innerHTML=chars.map(c=>`
    <div class="drawer-char">
      <div class="dc-dot active"></div>
      <div class="dc-info">
        <div class="dc-name">${esc(c.name)}</div>
        <div class="dc-email">${esc(c.email)}</div>
      </div>
    </div>
  `).join('')||'<div style="font-size:11px;color:var(--text3);padding:8px 0">キャラクターがいません</div>';
}

function openAddChar(id){
  editingId=id||null;
  const c=id?chars.find(x=>x.id===id):null;
  tempChains=c?c.chains.map(x=>({...x})):[{trigger:'',response:''}];
  document.getElementById('mf-name').value=c?c.name:'';
  document.getElementById('mf-email').value=c?c.email:'';
  document.getElementById('mf-intro').value=c?c.intro:'';
  document.getElementById('mf-fallback').value=c?(c.fallback||''):'';
  document.getElementById('modal-title').textContent=c?'キャラクターを編集':'キャラクターを追加';
  renderChainFields();
  document.getElementById('char-modal').classList.add('open');
}
function closeModal(){document.getElementById('char-modal').classList.remove('open');}
function addChainField(){tempChains.push({trigger:'',response:''});renderChainFields();}
function renderChainFields(){
  document.getElementById('mf-chains').innerHTML=tempChains.map((ch,i)=>`
    <div class="chain-block">
      <div class="chain-head">
        <span>チェーン ${i+1}</span>
        <button class="chain-del" onclick="tempChains.splice(${i},1);renderChainFields()">×</button>
      </div>
      <div class="ff" style="margin-bottom:8px"><label>トリガーワード（本文に含まれていたら反応）</label>
        <input type="text" value="${esc(ch.trigger)}" oninput="tempChains[${i}].trigger=this.value" placeholder="例: PROTOCOL" style="font-family:monospace"/>
      </div>
      <div class="ff" style="margin-bottom:0"><label>返信メッセージ</label>
        <textarea oninput="tempChains[${i}].response=this.value">${esc(ch.response)}</textarea>
      </div>
    </div>
  `).join('')||'<div style="font-size:11px;color:var(--text3);padding:8px 0">チェーンがありません</div>';
}
function saveChar(){
  const name=document.getElementById('mf-name').value.trim();
  const email=document.getElementById('mf-email').value.trim();
  const intro=document.getElementById('mf-intro').value.trim();
  const fallback=document.getElementById('mf-fallback').value.trim();
  if(!name||!email){toast('名前とメールアドレスは必須です');return;}
  const chains=tempChains.filter(c=>c.trigger.trim()&&c.response.trim());
  if(editingId){
    chars=chars.map(c=>c.id===editingId?{...c,name,email,intro,fallback,chains}:c);
  }else{
    chars.push({id:Date.now(),name,email,intro,fallback,chains});
  }
  closeModal();saveChars();renderDrawer();
  toast('保存しました');
}

async function clearAllData(){
  if(!confirm('全データをリセットしますか？'))return;
  try{await window.storage.delete(STORAGE_KEY_CHARS);}catch(e){}
  try{await window.storage.delete(STORAGE_KEY_INBOX);}catch(e){}
  try{await window.storage.delete(STORAGE_KEY_CHAIN);}catch(e){}
  chars=[];inbox=[];chainState={};
  loadDefaults();renderList();updateBadge();toggleDrawer();
  toast('リセットしました');
}

async function init(){
  await loadAll();
  document.getElementById('loading').style.display='none';
  renderList();updateBadge();
}
init();
</script>
